<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mariage Traditionnel Chinois — Binger & Clément</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=Lato:wght@300;400&family=Noto+Serif+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --red:      #D91F26;
      --red-dark: #A81820;
      --gold:     #C9A84C;
      --gold-l:   rgba(201,168,76,.3);
      --cream:    #FAF0E0;
      --paper:    #FAF0E0;
      --paper-d:  #F0E2C8;
      --ink:      #2A0800;
      --muted:    #7A5040;
      --gold-d:   #8A6B28;
      --serif-cn: 'Noto Serif SC', serif;
      --serif-lat:'Cinzel', serif;
      --sans:     'Lato', system-ui, sans-serif;
    }
    html { scroll-behavior: smooth; }
    body { font-family: var(--sans); background: var(--red); color: var(--cream); line-height: 1.65; font-weight: 300; }

    /* ── LANG MODAL ── */
    .lang-modal {
      position: fixed; inset: 0; z-index: 500;
      display: flex; align-items: center; justify-content: center;
      background: rgba(60,5,5,.9); backdrop-filter: blur(10px);
      transition: opacity .35s;
    }
    .lang-modal.hidden { opacity: 0; pointer-events: none; }
    .lang-modal-box {
      background: #1C0505; border: 1px solid var(--gold-l);
      padding: 2.75rem 2.5rem 2.25rem; text-align: center;
      max-width: 340px; width: 88%; position: relative;
    }
    .lang-modal-box::before { content: ''; position: absolute; inset: .4rem; border: 1px solid rgba(201,168,76,.15); pointer-events: none; }
    .lm-xi { font-family: var(--serif-cn); font-size: 2rem; color: var(--gold); line-height: 1; margin-bottom: .75rem; }
    .lm-name { font-family: var(--serif-lat); font-size: 1.1rem; letter-spacing: .15em; color: var(--cream); margin-bottom: .4rem; }
    .lm-event { font-size: .6rem; letter-spacing: .28em; text-transform: uppercase; color: var(--gold); margin-bottom: 1.75rem; display: block; opacity: .8; }
    .lm-hint { font-size: .7rem; color: rgba(250,240,224,.5); margin-bottom: 1.25rem; }
    .lang-choices { display: flex; border: 1px solid var(--gold-l); }
    .lang-choice {
      flex: 1; padding: .8rem .5rem; background: none; border: none;
      border-right: 1px solid var(--gold-l); font-family: var(--sans);
      font-size: .78rem; letter-spacing: .1em; cursor: pointer;
      text-transform: uppercase; color: rgba(250,240,224,.45); transition: all .2s;
    }
    .lang-choice:last-child { border-right: none; }
    .lang-choice:hover { background: var(--red); color: var(--gold); }

    /* ── HERO ── */
    .hero {
      height: 100svh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 3.5rem clamp(3rem, 14%, 120px) 2.5rem;
      position: relative; overflow: hidden; background: var(--red);
    }
    /* Radial depth on red */
    .hero::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 30%, rgba(217,31,38,.0) 0%, rgba(100,10,10,.35) 100%);
      pointer-events: none;
    }
    /* Subtle pattern overlay */
    .hero::after {
      content: ''; position: absolute; inset: 0;
      background: repeating-linear-gradient(45deg, transparent, transparent 40px, rgba(255,255,255,.012) 40px, rgba(255,255,255,.012) 41px);
      pointer-events: none;
    }

    /* ── DRAGON ── */
    .dragon-wrap {
      position: absolute; left: 0; top: 50%; transform: translateY(-46%);
      height: min(72vh, 460px); width: auto; opacity: .38;
      pointer-events: none; z-index: 1;
    }
    .dragon-wrap svg { height: 100%; width: auto; }

    /* ── PHOENIX ── */
    .phoenix-wrap {
      position: absolute; right: 0; top: 50%; transform: translateY(-46%);
      height: min(72vh, 460px); width: auto; opacity: .38;
      pointer-events: none; z-index: 1;
    }
    .phoenix-wrap svg { height: 100%; width: auto; }

    /* Hero content */
    .hero-inner { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; }

    .xi-main { font-family: var(--serif-cn); font-size: clamp(2.5rem, 5vw, 4.5rem); color: var(--gold); line-height: 1; margin-bottom: 1rem; }

    /* Illustration placeholder */
    .ill-wrap { width: min(200px, 55%); height: 26vh; max-height: 190px; margin: 0 auto 1.5rem; position: relative; flex-shrink: 0; }
    .ill-ph {
      position: absolute; inset: 0; border: 1px solid var(--gold-l);
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: .5rem;
      background: repeating-linear-gradient(-45deg, transparent, transparent 16px, rgba(201,168,76,.04) 16px, rgba(201,168,76,.04) 17px);
    }
    .ill-ph::before { content: ''; position: absolute; inset: .4rem; border: 1px solid rgba(201,168,76,.12); }
    .ill-label { font-family: 'Courier New', monospace; font-size: .56rem; letter-spacing: .14em; text-transform: uppercase; color: rgba(201,168,76,.55); position: relative; z-index: 1; }
    .ill-img { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* Gold separator */
    .gold-sep { display: flex; align-items: center; justify-content: center; gap: .75rem; margin: .75rem 0; width: 100%; max-width: 300px; }
    .gold-sep::before, .gold-sep::after { content: ''; flex: 1; height: 1px; background: var(--gold-l); }
    .sep-diamond { width: 5px; height: 5px; background: var(--gold); transform: rotate(45deg); opacity: .7; flex-shrink: 0; }

    .event-label { font-size: .6rem; letter-spacing: .3em; text-transform: uppercase; color: rgba(201,168,76,.75); margin-bottom: 1rem; }
    .couple-name-cn { font-family: var(--serif-cn); font-size: clamp(1.6rem, 3.5vw, 2.8rem); color: var(--gold); letter-spacing: .15em; line-height: 1.15; margin-bottom: .3rem; }
    .couple-name-lat { font-family: var(--serif-lat); font-size: clamp(.72rem, 1.1vw, .9rem); color: rgba(250,240,224,.5); letter-spacing: .22em; margin-bottom: 1rem; }
    .hero-meta { font-size: .8rem; color: rgba(250,240,224,.6); }
    .hero-meta p { margin-bottom: .15rem; }

    /* Mini lang strip */
    .lang-strip { margin-top: 1.25rem; display: flex; align-items: center; justify-content: center; gap: .4rem; }
    .lang-mini { background: none; border: none; font-family: var(--sans); font-size: .62rem; letter-spacing: .12em; text-transform: uppercase; color: rgba(250,240,224,.3); cursor: pointer; padding: .1rem .2rem; transition: color .2s; }
    .lang-mini.active { color: var(--gold); }
    .lang-mini:hover { color: var(--gold); }
    .lang-strip-sep { color: rgba(201,168,76,.3); font-size: .6rem; }

    /* Scroll cue */
    .scroll-cue { margin-top: 1.5rem; color: var(--gold); opacity: .45; animation: scrollAnim 2.5s ease-in-out infinite; }
    @keyframes scrollAnim { 0%,100%{transform:translateY(0);opacity:.3}50%{transform:translateY(5px);opacity:.65} }

    /* ── ACTIONS BAR ── */
    .actions-bar {
      display: flex; align-items: center; justify-content: center; gap: 1.5rem;
      padding: 1.75rem 2rem; flex-wrap: wrap; background: var(--paper);
      border-bottom: 1px solid rgba(138,107,40,.2); color: var(--ink);
    }
    .action-link { display: flex; align-items: center; gap: .4rem; text-decoration: none; color: var(--muted); font-size: .68rem; letter-spacing: .12em; text-transform: uppercase; transition: color .2s; padding-bottom: .15rem; border-bottom: 1px solid transparent; }
    .action-link:hover { color: var(--red); border-bottom-color: rgba(217,31,38,.25); }
    .action-ico { font-family: var(--serif-cn); font-size: .9rem; }
    .action-brand { font-family: var(--serif-lat); font-size: .75rem; text-transform: none; letter-spacing: .05em; opacity: .45; }
    .action-sep { color: rgba(138,107,40,.35); }

    /* ── REVEAL ── */
    .reveal { opacity: 0; transform: translateY(18px); transition: opacity .7s ease, transform .7s ease; }
    .reveal.in-view { opacity: 1; transform: translateY(0); }

    /* ── SECTIONS — cream background ── */
    .section { padding: 5rem 2rem; background: var(--paper); color: var(--ink); }
    .section-alt { background: var(--paper-d); }
    .section-inner { max-width: 860px; margin: 0 auto; }
    .section-hd { margin-bottom: 3rem; }
    .section-num { display: block; font-size: .62rem; letter-spacing: .3em; text-transform: uppercase; color: var(--red); margin-bottom: .5rem; opacity: .7; }
    .section-title { font-family: var(--serif-cn); font-size: clamp(1.7rem, 3vw, 2.5rem); font-weight: 400; color: var(--ink); }

    /* TIMELINE */
    .timeline { display: flex; flex-direction: column; }
    .tl-item { display: grid; grid-template-columns: 5rem 1px 1fr; gap: 0 1.75rem; padding-bottom: 2rem; }
    .tl-item:last-child { padding-bottom: 0; }
    .tl-time { font-family: var(--serif-cn); font-size: .85rem; font-weight: 300; color: var(--red); text-align: right; padding-top: .05rem; }
    .tl-line { background: rgba(217,31,38,.18); position: relative; }
    .tl-line::before { content: ''; position: absolute; top: .3rem; left: -4px; width: 8px; height: 8px; background: var(--red); }
    .tl-body h3 { font-family: var(--serif-cn); font-size: 1.05rem; font-weight: 400; color: var(--ink); margin-bottom: .2rem; }
    .tl-body p { font-size: .82rem; color: var(--muted); }

    /* MAP */
    .map-ph { width: 100%; height: 250px; margin-bottom: 2.5rem; border: 1px solid rgba(138,107,40,.25); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: .5rem; background: repeating-linear-gradient(0deg,transparent,transparent 26px,rgba(138,107,40,.04) 26px,rgba(138,107,40,.04) 27px); font-family: 'Courier New',monospace; font-size: .65rem; color: var(--gold-d); letter-spacing: .1em; }

    /* TRANSPORT */
    .transport-list { display: flex; flex-direction: column; gap: 1.25rem; }
    .t-item { display: grid; grid-template-columns: 3rem 1fr; gap: 1.25rem; align-items: start; }
    .t-ico { width: 3rem; height: 3rem; border: 1px solid rgba(138,107,40,.25); display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
    .t-body h4 { font-family: var(--serif-cn); font-weight: 400; color: var(--ink); margin-bottom: .2rem; }
    .t-body p { font-size: .82rem; color: var(--muted); line-height: 1.55; }

    /* CARDS */
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 1.5rem; }
    .card { border: 1px solid rgba(138,107,40,.25); padding: 1.5rem; background: var(--paper); }
    .card-tag { display: inline-block; font-size: .6rem; letter-spacing: .16em; text-transform: uppercase; color: var(--gold-d); border: 1px solid rgba(138,107,40,.25); padding: .2rem .55rem; margin-bottom: .75rem; }
    .card h3 { font-family: var(--serif-cn); font-size: 1.05rem; font-weight: 400; color: var(--ink); margin-bottom: .4rem; }
    .card p { font-size: .82rem; color: var(--muted); line-height: 1.6; }
    .card a { color: var(--red); text-decoration: none; }
    .card-photo { display:block; width:calc(100% + 3rem); margin:-1.5rem -1.5rem .85rem; height:160px; object-fit:cover; }

    /* FOOTER */
    footer { text-align: center; padding: 2.5rem 2rem; border-top: 1px solid rgba(217,31,38,.2); background: var(--paper); }
    .footer-cn { font-family: var(--serif-cn); font-size: 1.05rem; color: var(--red); display: block; margin-bottom: .35rem; letter-spacing: .2em; font-weight: 300; }
    .footer-lat { font-family: var(--serif-lat); font-size: .7rem; color: var(--gold-d); letter-spacing: .25em; }

    @media(max-width:700px) {
      .dragon-wrap, .phoenix-wrap { display: none; }
      .hero { padding: 3.5rem 1.5rem 2rem; }
      .ill-wrap { height: 24vh; max-height: 160px; }
      .couple-name-cn { font-size: 1.6rem; }
    }
    @media(max-width:480px) { .hero { padding: 3rem 1.25rem 2rem; } }
  </style>
</head>
<body>

const LANG_KEY = 'chinois_lang';
let lang = localStorage.getItem(LANG_KEY) || null;

function applyLang(l) {
  lang = l; localStorage.setItem(LANG_KEY, l);
  const t = T[l];
  document.querySelectorAll('.t[data-key]').forEach(el => { const v = t[el.dataset.key]; if (v !== undefined) el.textContent = v; });
  document.querySelectorAll('.lang-mini, .lang-choice').forEach(b => b.classList.toggle('active', b.dataset.lang === l));
}

const modal = document.getElementById('langModal');
if (lang) { modal.classList.add('hidden'); applyLang(lang); } else { applyLang('fr'); }

document.querySelectorAll('.lang-choice').forEach(b => b.addEventListener('click', () => {
  applyLang(b.dataset.lang); modal.style.opacity = '0';
  setTimeout(() => modal.classList.add('hidden'), 350);
}));
document.querySelectorAll('.lang-mini').forEach(b => b.addEventListener('click', () => applyLang(b.dataset.lang)));

const revealObs = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('in-view'); });
}, { threshold: 0.07 });
document.querySelectorAll('.reveal').forEach(el => revealObs.observe(el));
</script>
